<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Readera</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .profile-container {
            max-width: 800px;
            margin: 40px auto;
            background: var(--white);
            padding: 40px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
        }
        .profile-header {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 1px solid #eee;
        }
        .profile-avatar {
            width: 100px;
            height: 100px;
            background: var(--secondary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: var(--primary-color);
            font-family: 'Playfair Display', serif;
        }
        .order-history {
            margin-top: 40px;
        }
        .order-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .order-table th, .order-table td {
            text-align: left;
            padding: 15px;
            border-bottom: 1px solid #eee;
        }
        .order-table th {
            background: #f8f9fa;
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-brand">
            <a href="index.html">Readera</a>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="browse.html">Browse Books</a>
        </div>
        <div class="nav-user">
            <!-- Nav updates dynamically via api.js -->
            <a href="cart.html" class="cart-link">Cart (<span id="cart-count">0</span>)</a>
            <a href="auth.html" class="btn btn-primary guest-only">Login</a>
            
            <!-- Authenticated Links -->
            <a href="library.html" class="user-only">My Library</a>
            <a href="profile.html" class="user-only" id="nav-username">Profile</a>
            <a href="#" id="logout-btn" class="user-only">Logout</a>
        </div>
    </nav>

    <div class="loader" id="global-loader"></div>

    <div class="container">
        <div class="profile-container">
            <div class="profile-header">
                <div class="profile-avatar" id="profile-initials">R</div>
                <div>
                    <h2 id="profile-name">User Name</h2>
                    <p id="profile-email">user@example.com</p>
                </div>
            </div>

            <div class="order-history">
                <h3>Order History</h3>
                <div id="order-history-container">
                    <!-- Orders will be injected here via JS -->
                    <p>Loading your orders...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
             if (!AuthService.isAuthenticated()) {
                window.location.href = 'auth.html';
                return;
            }

            const user = AuthService.getUser();
            if (user) {
                document.getElementById('profile-name').textContent = user.name;
                document.getElementById('profile-email').textContent = user.email;
                document.getElementById('profile-initials').textContent = user.name.charAt(0).toUpperCase();
            }

            try {
                const orders = await fetchAPI('/orders');
                renderOrders(orders);
            } catch (error) {
                document.getElementById('order-history-container').innerHTML = '<p>Failed to load orders.</p>';
            }
        });

        function renderOrders(orders) {
            const container = document.getElementById('order-history-container');
            if (orders.length === 0) {
                container.innerHTML = '<p>No orders yet.</p>';
                return;
            }

            container.innerHTML = `
                <table class="order-table">
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Date</th>
                            <th>Amount</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${orders.map(order => `
                            <tr>
                                <td>#${order.id}</td>
                                <td>${new Date(order.created_at).toLocaleDateString()}</td>
                                <td>₹${order.amount}</td>
                                <td>${order.status}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }
    </script>
</body>
</html>
