<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Readera - Digital Library</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f5f7fa;
        }

        .navbar {
            background: #0a2540;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .logo a {
            color: #d4af37;
            font-size: 1.8rem;
            font-weight: bold;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
        }

        .hero {
            background: #0a2540;
            color: white;
            text-align: center;
            padding: 4rem 2rem;
        }

        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .search-box {
            max-width: 500px;
            margin: 2rem auto 0;
            display: flex;
        }

        .search-box input {
            flex: 1;
            padding: 1rem;
            border: none;
            border-radius: 8px 0 0 8px;
        }

        .search-box button {
            padding: 1rem 2rem;
            background: #d4af37;
            border: none;
            border-radius: 0 8px 8px 0;
            cursor: pointer;
            font-weight: bold;
        }

        .featured {
            max-width: 1200px;
            margin: 3rem auto;
            padding: 0 2rem;
        }

        .featured h2 {
            margin-bottom: 1.5rem;
            color: #0a2540;
        }

        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.5rem;
        }

        .book-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .book-cover {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .book-info {
            padding: 0.8rem;
        }

        .book-title {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .book-author {
            font-size: 0.8rem;
            color: #666;
        }

        .book-price {
            color: #d4af37;
            font-weight: bold;
            margin-top: 0.3rem;
        }

        footer {
            background: #0a2540;
            color: white;
            text-align: center;
            padding: 2rem;
            margin-top: 3rem;
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 1rem;
            }

            .hero h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <div class="logo"><a href="index.html">Readera</a></div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="browse.html">Browse Books</a>
            <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
            <a href="auth.html">Login</a>
        </div>
    </nav>

    <section class="hero">
        <h1>Discover Your Next Read</h1>
        <p>Explore thousands of eBooks across all genres</p>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search by title, author...">
            <button onclick="searchBooks()">Search</button>
        </div>
    </section>

    <section class="featured">
        <h2>📚 Featured Books</h2>
        <div class="books-grid" id="featuredGrid">Loading...</div>
    </section>

    <footer>
        <p>&copy; 2025 Readera. All rights reserved.</p>
    </footer>

    <script>
        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const el = document.getElementById('cart-count');
            if (el) el.textContent = cart.length;
        }

        function searchBooks() {
            const query = document.getElementById('searchInput').value.trim();
            if (query) window.location.href = `browse.html?search=${encodeURIComponent(query)}`;
            else alert('Enter a search term');
        }

        async function loadFeatured() {
            const grid = document.getElementById('featuredGrid');
            try {
                const res = await fetch('/books.json');
                const books = await res.json();
                const featured = books.slice(0, 6);
                grid.innerHTML = featured.map(book => `
                <div class="book-card" onclick="location.href='book.html?id=${book.id}'">
                    <img src="${book.cover_url || 'https://via.placeholder.com/180x220'}" class="book-cover" onerror="this.src='https://via.placeholder.com/180x220'">
                    <div class="book-info">
                        <div class="book-title">${book.title.substring(0, 35)}</div>
                        <div class="book-author">${book.author || 'Unknown'}</div>
                        <div class="book-price">${book.price === 0 ? 'FREE' : '₹' + book.price}</div>
                    </div>
                </div>
            `).join('');
            } catch (e) {
                grid.innerHTML = '<p>Failed to load books. Refresh the page.</p>';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateCartCount();
            loadFeatured();
        });
    </script>
</body>

</html>
