<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookSummarizer AI - Romance Novels</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header/Navbar */
        .navbar {
            background: white;
            border-radius: 20px;
            padding: 15px 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .download-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .download-btn:hover {
            transform: scale(1.05);
        }

        /* Book Card */
        .book-card {
            background: white;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .book-hero {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        /* 3D Book Cover Sketch */
        .book-cover {
            flex: 0 0 250px;
            perspective: 1000px;
        }

        .cover-3d {
            width: 100%;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 15px;
            padding: 60px 20px;
            text-align: center;
            transform: rotateY(5deg);
            box-shadow: 20px 20px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s;
        }

        .cover-3d:hover {
            transform: rotateY(0deg);
        }

        .cover-3d i {
            font-size: 80px;
            color: white;
            margin-bottom: 20px;
        }

        .cover-3d h3 {
            color: white;
            font-size: 24px;
        }

        /* Book Info */
        .book-info {
            flex: 1;
        }

        .book-title {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .book-meta {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin: 20px 0;
            padding: 20px 0;
            border-top: 1px solid #e0e0e0;
            border-bottom: 1px solid #e0e0e0;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .meta-label {
            font-weight: 600;
            color: #666;
        }

        .meta-value {
            color: #333;
        }

        /* Summary Section */
        .summary-section {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 30px;
            margin-top: 20px;
        }

        .summary-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #333;
        }

        .summary-text {
            line-height: 1.8;
            color: #555;
            font-size: 16px;
        }

        .loading {
            text-align: center;
            padding: 60px;
            font-size: 18px;
            color: #667eea;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Book Selector */
        .book-selector {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }

        select {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .book-hero {
                flex-direction: column;
            }

            .book-title {
                font-size: 28px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="navbar">
            <span class="back-btn" onclick="history.back()">← Back to Books</span>
            <button class="download-btn" onclick="downloadPDF()">📄 Download as PDF</button>
        </div>

        <div class="book-selector">
            <label style="font-weight: 600;">📖 Select Romance Novel:</label>
            <select id="bookSelect" onchange="loadBookSummary()">
                <option value="4thwing">Fourth Wing - Rebecca Yarros</option>
                <option value="itendswithus">It Ends With Us - Colleen Hoover</option>
                <option value="normalpeople">Normal People - Sally Rooney</option>
                <option value="lovehypothesis">The Love Hypothesis - Ali Hazelwood</option>
                <option value="sevenhusbands">The Seven Husbands of Evelyn Hugo - Taylor Jenkins Reid</option>
            </select>
        </div>

        <div id="bookContent">
            <!-- Dynamic content will load here -->
            <div class="book-card">
                <div class="loading">
                    <div class="spinner"></div>
                    Loading summary...
                </div>
            </div>
        </div>
    </div>

    <script>
        // Book Database (ISBN, Pages, etc)
        const booksDB = {
            '4thwing': {
                title: 'Fourth Wing',
                author: 'Rebecca Yarros',
                isbn: '9781649374042',
                pages: 528,
                genre: 'Romance/Fantasy'
            },
            'itendswithus': {
                title: 'It Ends With Us',
                author: 'Colleen Hoover',
                isbn: '9781501110368',
                pages: 376,
                genre: 'Contemporary Romance'
            },
            'normalpeople': {
                title: 'Normal People',
                author: 'Sally Rooney',
                isbn: '9781984822178',
                pages: 288,
                genre: 'Literary Romance'
            },
            'lovehypothesis': {
                title: 'The Love Hypothesis',
                author: 'Ali Hazelwood',
                isbn: '9780593336823',
                pages: 368,
                genre: 'Rom-Com'
            },
            'sevenhusbands': {
                title: 'The Seven Husbands of Evelyn Hugo',
                author: 'Taylor Jenkins Reid',
                isbn: '9781501161933',
                pages: 400,
                genre: 'Historical Romance'
            }
        };

        // Pre-written summaries (No API needed - instant!)
        const summariesDB = {
            '4thwing': `Violet Sorrengail, a 20-year-old scribe-in-training, never expected to be forced into the brutal Riders Quadrant at Basgiath War College. In a world where dragons bond with riders for life, Violet's frail body makes her an unlikely candidate. But her mother, the commanding general, has other plans.

Enter Xaden Riorson, the powerful and mysterious wing leader whose family was executed by Violet's mother. Their initial hatred simmers with undeniable chemistry as Violet fights to survive the deadly challenges: the Parapet crossing, the Gauntlet obstacle course, and ultimately, Threshing - where dragons choose their riders.

What makes "Fourth Wing" exceptional is Yarros's masterful blend of high-stakes fantasy and slow-burn romance. The enemies-to-lovers trope is executed perfectly, with dialogue that crackles and tension that builds to an explosive climax. The dragon bond mechanics are unique - each dragon speaks telepathically to their rider, creating intimate connections that transcend romance.

Spoiler-Free Verdict: If you loved "Divergent" meets "Game of Thrones" with dragons and a romance that will make you swoon, this is your next obsession. The final plot twist about the venin (dark magic wielders) and the true history of Navarre will leave you desperate for book two.`,

            'itendswithus': `Lily Bloom, a young woman who has always known she wanted a different life than her abusive father gave her mother, moves to Boston and opens a flower shop. There she meets Ryle Kincaid - a brilliant, arrogant neurosurgeon who doesn't believe in relationships but finds himself drawn to Lily.

Their whirlwind romance is passionate and intense, filled with rooftop conversations and magnetic chemistry. But Ryle has a "naked truth" - he hurts the women he loves when his anger takes over. As red flags appear, Lily reconnects with her first love, Atlas Corrigan, a homeless boy she once saved who is now a successful chef.

Hoover's genius lies in making you fall in love with Ryle while slowly revealing the cycle of abuse. The book's title comes from a promise Lily's father made her mother - "It ends with us" - breaking the generational trauma. The courtroom scene and Lily's ultimate choice will shatter you.

Spoiler-Free: This isn't just a romance - it's a survival guide wrapped in a love story. Trigger warnings for domestic abuse, but the healing arc is beautiful. Colleen Hoover's most important book.`,

            'normalpeople': `Connell Waldron and Marianne Sheridan are classmates in a small Irish town. Connell is popular and athletic; Marianne is strange and friendless. But when Connell picks up his mother from Marianne's house (where she works as a cleaner), a secret connection forms.

Their relationship begins physically - hidden meetings, stolen moments. But "Normal People" is about so much more than romance. It's about class, privilege, and how two people can shape each other across years. At Trinity College Dublin, their roles reverse: Marianne becomes popular and wealthy, while Connell struggles with imposter syndrome.

Rooney writes with surgical precision about miscommunication, vulnerability, and the invisible threads that bind people together. The "will they/won't they" spans continents - Connell goes to New York, Marianne stays in Dublin with an abusive partner. Their reunion scene in Italy is literary perfection.

Spoiler-Free: This is not a typical happy-ever-after romance. It's raw, uncomfortable, and deeply human. The final line - "He brings her goodness like a gift" - will haunt you for weeks. Best for readers who love character-driven literary fiction.`,

            'lovehypothesis': `Olive Smith is a third-year PhD candidate at Stanford who doesn't believe in lasting romantic relationships. But when her best friend Anh shows interest in Olive's ex-boyfriend (whom Olive is totally over, really), Olive panics and kisses the first man she sees.

That man is Dr. Adam Carlsen - a handsome, grumpy, terrifyingly brilliant young professor known for making students cry. To convince Anh she's moved on, Olive and Adam enter a fake dating agreement. What could go wrong?

Hazelwood (a real-life neuroscience professor) nails academic culture - the lab politics, the grant writing desperation, the conference hookups. The fake relationship trope gets fresh life with Olive's scientific approach: she creates hypotheses about Adam's behavior, which he methodically disproves by being unexpectedly sweet. The scene where Adam defends Olive's research at a conference is peak romance.

Spoiler-Free: This is for anyone who loves grumpy-sunshine dynamics, forced proximity (lab partners!), and a hero who says "I can't stop thinking about you" like he's reciting data. The sex positivity and consent representation are excellent.`,

            'sevenhusbands': `In 2017, aging Hollywood icon Evelyn Hugo (now 79 and reclusive) grants unknown journalist Monique Grant an exclusive interview. The catch? Monique gets to write Evelyn's tell-all memoir - and Evelyn will reveal which of her seven husbands was her true love.

The story flashes back to 1950s Hollywood, where Evelyn, born in Hell's Kitchen to Cuban parents, claws her way to stardom. Her marriages include: a closeted gay actor (publicity), a controlling producer (power), a kind musician (stability), and more. But the real love story? It's with Celia St. James, a rival actress with emerald eyes and an Irish temper.

Reid weaves Old Hollywood glamour with devastating queer heartbreak. The lesbian romance between Evelyn and Celia spans decades, hidden from cameras but burning brighter than any of Evelyn's marriages. Monique's own storyline (a recent divorce, a mysterious father) parallels Evelyn's in surprising ways.

Spoiler-Free: The final reveal about Monique's connection to Evelyn will make you gasp. This is a book about sacrifice, ambition, and whether true love can survive in a world that demands you hide it. Bring tissues.`
        };

        async function loadBookSummary() {
            const bookId = document.getElementById('bookSelect').value;
            const book = booksDB[bookId];
            const summary = summariesDB[bookId];

            // Simulate slight delay for realism
            document.getElementById('bookContent').innerHTML = `
                <div class="book-card">
                    <div class="loading">
                        <div class="spinner"></div>
                        Loading summary...
                    </div>
                </div>
            `;

            setTimeout(() => {
                renderBookContent(book, summary, bookId);
            }, 500);
        }

        function renderBookContent(book, summary, bookId) {
            const html = `
                <div class="book-card" id="summaryContainer">
                    <div class="book-hero">
                        <div class="book-cover">
                            <div class="cover-3d">
                                <i>📖</i>
                                <h3>${book.title}</h3>
                                <p style="color:white; margin-top:10px;">${book.author}</p>
                            </div>
                        </div>
                        <div class="book-info">
                            <h1 class="book-title">${book.title}</h1>
                            <p style="color:#666; font-size:18px;">by ${book.author}</p>
                            <div class="book-meta">
                                <div class="meta-item"><span class="meta-label">ISBN:</span><span class="meta-value">${book.isbn}</span></div>
                                <div class="meta-item"><span class="meta-label">Pages:</span><span class="meta-value">${book.pages}</span></div>
                                <div class="meta-item"><span class="meta-label">Genre:</span><span class="meta-value">${book.genre}</span></div>
                            </div>
                        </div>
                    </div>
                    <div class="summary-section" id="pdfContent">
                        <div class="summary-title">✨ Book Summary (Spoiler-Free)</div>
                        <div class="summary-text">${summary.replace(/\n/g, '<br><br>')}</div>
                        <br>
                        <hr>
                        <p style="color:#999; font-size:12px; margin-top:20px;">© BookSummarizer AI - Generated for reading purposes</p>
                    </div>
                </div>
            `;
            document.getElementById('bookContent').innerHTML = html;
        }

        async function downloadPDF() {
            const element = document.getElementById('pdfContent');
            if (!element) return;

            // Show loading on button
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = '⏳ Generating PDF...';
            btn.disabled = true;

            try {
                const canvas = await html2canvas(element, {
                    scale: 2,
                    backgroundColor: '#ffffff',
                    logging: false
                });

                const imgData = canvas.toDataURL('image/png');
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');
                const imgWidth = 210;
                const imgHeight = (canvas.height * imgWidth) / canvas.width;

                pdf.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);
                pdf.save(`${book.title}_Summary.pdf`);
            } catch (error) {
                console.error('PDF Error:', error);
                alert('Error generating PDF. Please try again.');
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        // Load default book on page load
        window.addEventListener('DOMContentLoaded', () => {
            loadBookSummary();
        });
    </script>
</body>

</html>
