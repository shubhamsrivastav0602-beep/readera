<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Summarizer - AI Romance Summaries</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .book-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .book-selector {
            margin-bottom: 25px;
        }

        .book-selector label {
            display: block;
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
        }

        select {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 25px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .summary-container {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            min-height: 300px;
            border-left: 4px solid #667eea;
        }

        .summary-title {
            font-size: 20px;
            font-weight: 700;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .summary-text {
            line-height: 1.8;
            color: #555;
            font-size: 16px;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .error {
            color: #dc3545;
            text-align: center;
            padding: 20px;
            background: #ffe6e6;
            border-radius: 10px;
        }

        .success {
            color: #28a745;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: white;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .book-card {
                padding: 20px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>📚 Romance Book Summarizer</h1>
            <p>Get beautiful, spoiler-free summaries of the world's best romance novels</p>
        </div>

        <div class="book-card">
            <div class="book-selector">
                <label>📖 Select a Romance Novel:</label>
                <select id="bookSelect">
                    <option value="fourth wing">🔥 Fourth Wing - Rebecca Yarros (Dragon Romance)</option>
                    <option value="it ends with us">💔 It Ends With Us - Colleen Hoover</option>
                    <option value="normal people">💕 Normal People - Sally Rooney</option>
                    <option value="love hypothesis">🔬 The Love Hypothesis - Ali Hazelwood</option>
                    <option value="evelyn hugo">✨ The Seven Husbands of Evelyn Hugo - Taylor Jenkins Reid</option>
                </select>
            </div>

            <button onclick="getBookSummary()">
                ✨ Generate Summary
            </button>

            <div class="summary-container" id="summaryContainer">
                <div class="summary-title">
                    <span>📖</span>
                    <span>Your Summary Will Appear Here</span>
                </div>
                <div class="summary-text">
                    Select a book from the dropdown and click "Generate Summary" to get started.
                </div>
            </div>
        </div>

        <div class="footer">
            <p>⚡ Powered by AI | 📝 Spoiler-Free Summaries | 💾 Download as PDF coming soon</p>
        </div>
    </div>

    <script>
        async function getBookSummary() {
            const select = document.getElementById('bookSelect');
            const title = select.options[select.selectedIndex].text.split(' - ')[0];
            const summaryContainer = document.getElementById('summaryContainer');

            // Show loading state
            summaryContainer.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>🤖 AI is generating your summary...</p>
                    <small style="color: #999;">This may take a few seconds</small>
                </div>
            `;

            try {
                const response = await fetch('http://localhost:3000/api/summary', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        title: title,
                        author: ""
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();

                if (data.success) {
                    summaryContainer.innerHTML = `
                        <div class="summary-title">
                            <span>📖</span>
                            <span>Summary: ${title}</span>
                        </div>
                        <div class="summary-text">
                            ${data.summary.replace(/\n/g, '<br><br>')}
                        </div>
                        <hr style="margin: 20px 0;">
                        <small style="color: #999;">✨ AI-generated spoiler-free summary | Enjoy the book!</small>
                    `;
                } else {
                    throw new Error('Failed to get summary');
                }

            } catch (error) {
                console.error('Error:', error);
                summaryContainer.innerHTML = `
                    <div class="error">
                        <strong>❌ Connection Error!</strong><br><br>
                        Make sure the backend server is running:<br>
                        1. Open terminal in: C:\\Users\\admin\\Desktop\\BookSummarizer\\backend<br>
                        2. Run: <code style="background:#333;color:#fff;padding:2px 6px;border-radius:4px;">node server.js</code><br>
                        3. Then refresh this page and try again.
                    </div>
                `;
            }
        }
    </script>
</body>

</html>
