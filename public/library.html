<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Library - Readera</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .library-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .book-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        .book-card:hover {
            transform: translateY(-5px);
        }

        .book-cover {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .book-info {
            padding: 12px;
        }

        .book-title {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .btn-read {
            background: #8B4513;
            color: white;
            border: none;
            padding: 8px;
            width: 100%;
            cursor: pointer;
            border-radius: 0 0 8px 8px;
        }

        .empty-library {
            text-align: center;
            padding: 60px;
        }
    </style>
</head>

<body>
    <nav>
        <div class="nav-brand"><a href="index.html">Readera</a></div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="browse.html">Browse Books</a>
        </div>
        <div class="nav-user">
            <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
            <a href="auth.html" class="guest-only">Log in</a>
            <a href="#" class="user-only readera-logout" style="display: none;">Log out</a>
        </div>
    </nav>

    <div class="container">
        <h1 class="section-title">📚 My Digital Library</h1>
        <div id="library-grid" class="library-grid">
            <div class="loader">Loading your library...</div>
        </div>
    </div>

    <script>
        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const el = document.getElementById('cart-count');
            if (el) el.textContent = cart.length;
        }

        function renderLibrary() {
            const library = JSON.parse(localStorage.getItem('library') || '[]');
            const grid = document.getElementById('library-grid');

            if (library.length === 0) {
                grid.innerHTML = `
                    <div class="empty-library">
                        <h2>Your library is empty</h2>
                        <p>Purchase books to see them here!</p>
                        <a href="browse.html" class="btn btn-primary">Browse Books</a>
                    </div>
                `;
                return;
            }

            grid.innerHTML = library.map(book => `
                <div class="book-card" onclick="location.href='book.html?id=${book.id}'">
                    <img src="${book.cover_url || 'https://via.placeholder.com/180x220?text=No+Cover'}" class="book-cover" onerror="this.src='https://via.placeholder.com/180x220?text=No+Cover'">
                    <div class="book-info">
                        <div class="book-title">${book.title.substring(0, 35)}</div>
                        <div class="book-author">${book.author || 'Unknown'}</div>
                    </div>
                    <button class="btn-read" onclick="event.stopPropagation(); location.href='book.html?id=${book.id}'">📖 Read Now</button>
                </div>
            `).join('');
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateCartCount();
            renderLibrary();
        });
    </script>
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
