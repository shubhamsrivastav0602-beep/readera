<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Books - Readera</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .page-layout {
            display: flex;
            gap: 30px;
        }

        .sidebar {
            width: 250px;
            flex-shrink: 0;
            background: var(--white);
            padding: 20px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            height: fit-content;
        }

        .main-content {
            flex-grow: 1;
        }

        .filter-group {
            margin-bottom: 20px;
        }

        .filter-group h4 {
            margin-bottom: 15px;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }

        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
        }

        .book-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .book-card:hover {
            transform: translateY(-5px);
        }

        .book-cover {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .book-info {
            padding: 15px;
        }

        .book-title {
            font-size: 1rem;
            margin: 0 0 5px 0;
        }

        .book-author {
            color: #666;
            font-size: 0.85rem;
            margin: 0 0 5px 0;
        }

        .book-price {
            color: #8B4513;
            font-weight: bold;
            margin: 0;
        }

        .free-badge {
            background: #27ae60;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            display: inline-block;
        }

        .error {
            text-align: center;
            padding: 40px;
            color: #e74c3c;
        }

        @media (max-width: 768px) {
            .page-layout {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <nav>
        <div class="nav-brand">
            <a href="index.html">Readera</a>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="browse.html" style="font-weight: bold;">Browse Books</a>
        </div>
        <div class="nav-user">
            <a href="cart.html" class="cart-link">Cart (<span id="cart-count">0</span>)</a>
            <a href="auth.html" class="btn btn-primary guest-only">Login</a>
            <a href="library.html" class="user-only">My Library</a>
            <a href="profile.html" class="user-only" id="nav-username">Profile</a>
            <a href="admin.html" class="admin-only">Admin</a>
            <a href="#" id="logout-btn" class="user-only">Logout</a>
        </div>
    </nav>

    <div class="container">
        <h1 class="section-title" id="page-title">All Books</h1>

        <div class="page-layout">
            <!-- Filters Sidebar -->
            <aside class="sidebar">
                <form id="filter-form">
                    <div class="filter-group" id="search-group" style="display: none;">
                        <h4>Search Results For</h4>
                        <p id="search-term-display"
                            style="font-weight: bold; color: var(--primary-color); word-break: break-all;"></p>
                    </div>

                    <div class="filter-group">
                        <h4>Genre</h4>
                        <select class="form-control" name="genre" id="filter-genre">
                            <option value="all">All Genres</option>
                            <option value="Fiction">Fiction</option>
                            <option value="Non-Fiction">Non-Fiction</option>
                            <option value="Tech">Tech</option>
                            <option value="Self-Help">Self-Help</option>
                            <option value="Sci-Fi">Sci-Fi</option>
                            <option value="Biography">Biography</option>
                            <option value="Finance">Finance</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <h4>Sort By</h4>
                        <select class="form-control" name="sort" id="filter-sort">
                            <option value="newest">Newest</option>
                            <option value="price_asc">Price: Low to High</option>
                            <option value="price_desc">Price: High to Low</option>
                            <option value="title_asc">Title: A-Z</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%;">Apply Filters</button>
                    <button type="button" id="clear-filters" class="btn btn-secondary"
                        style="width: 100%; margin-top: 10px;">Clear</button>
                </form>
            </aside>

            <!-- Main Catalog -->
            <main class="main-content">
                <div class="books-grid" id="books-grid"></div>
            </main>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        // Global variables
        let allBooks = [];

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const searchQuery = urlParams.get('search');

            if (searchQuery) {
                document.getElementById('search-group').style.display = 'block';
                document.getElementById('search-term-display').textContent = `"${searchQuery}"`;
                document.getElementById('page-title').textContent = 'Search Results';
                fetchSearch(searchQuery);
            } else {
                fetchBooks();
            }

            document.getElementById('filter-form').addEventListener('submit', (e) => {
                e.preventDefault();
                fetchBooks();
            });

            document.getElementById('clear-filters').addEventListener('click', () => {
                document.getElementById('filter-genre').value = 'all';
                document.getElementById('filter-sort').value = 'newest';
                fetchBooks();
            });

            // Update cart count
            updateCartCount();
        });

        // ✅ FIXED: Books from static JSON file, not API
        async function fetchBooks() {
            const booksGrid = document.getElementById('books-grid');
            booksGrid.innerHTML = '<div class="loader"></div>';

            try {
                // ✅ Changed from /api/books to /books.json
                const response = await fetch('/books.json');

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                let books = await response.json();

                // Ensure books is an array
                if (!Array.isArray(books)) {
                    books = [];
                }

                allBooks = books;

                // Apply filters
                let filteredBooks = [...allBooks];

                // Genre filter
                const genre = document.getElementById('filter-genre').value;
                if (genre && genre !== 'all') {
                    filteredBooks = filteredBooks.filter(book => book.genre === genre);
                }

                // Sort
                const sort = document.getElementById('filter-sort').value;
                if (sort === 'price_asc') {
                    filteredBooks.sort((a, b) => (a.price || 0) - (b.price || 0));
                } else if (sort === 'price_desc') {
                    filteredBooks.sort((a, b) => (b.price || 0) - (a.price || 0));
                } else if (sort === 'title_asc') {
                    filteredBooks.sort((a, b) => (a.title || '').localeCompare(b.title || ''));
                }

                renderBooks(filteredBooks);

            } catch (error) {
                console.error('Error fetching books:', error);
                booksGrid.innerHTML = '<p class="error">Error loading books. Please try again.</p>';
            }
        }

        // ✅ FIXED: Search from static JSON
        async function fetchSearch(query) {
            const booksGrid = document.getElementById('books-grid');
            booksGrid.innerHTML = '<div class="loader"></div>';

            try {
                // ✅ Changed from API to static JSON
                const response = await fetch('/books.json');

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                let books = await response.json();

                if (!Array.isArray(books)) {
                    books = [];
                }

                // Filter by search query
                const filteredBooks = books.filter(book =>
                    book.title.toLowerCase().includes(query.toLowerCase()) ||
                    (book.author && book.author.toLowerCase().includes(query.toLowerCase()))
                );

                renderBooks(filteredBooks);

            } catch (error) {
                console.error('Error searching books:', error);
                booksGrid.innerHTML = '<p class="error">Error searching books. Please try again.</p>';
            }
        }

        function renderBooks(books) {
            const container = document.getElementById('books-grid');

            if (!books || books.length === 0) {
                container.innerHTML = '<p class="error">No books found matching your criteria.</p>';
                return;
            }

            container.innerHTML = books.map(book => `
                <a href="book.html?id=${book.id}" class="book-card">
                    <img src="${book.cover_url || '/images/default-cover.jpg'}" alt="${book.title}" class="book-cover" onerror="this.src='/images/default-cover.jpg'">
                    <div class="book-info">
                        <h3 class="book-title">${escapeHtml(book.title)}</h3>
                        <p class="book-author">${escapeHtml(book.author || 'Unknown')}</p>
                        <p class="book-price">${book.is_free || book.price === 0 ? '<span class="free-badge">FREE</span>' : `₹${book.price}`}</p>
                    </div>
                </a>
            `).join('');
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function (m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        async function updateCartCount() {
            try {
                const cart = JSON.parse(localStorage.getItem('cart') || '[]');
                const cartCount = document.getElementById('cart-count');
                if (cartCount) {
                    cartCount.textContent = cart.length;
                }
            } catch (e) {
                console.error('Error updating cart:', e);
            }
        }
    </script>
</body>

</html>
