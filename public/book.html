<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Details - Readera</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600&family=Playfair+Display:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .book-container {
            max-width: 900px;
            margin: 40px auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .book-header {
            display: flex;
            gap: 30px;
            padding: 30px;
            background: #f9f5f0;
        }

        .book-cover {
            width: 200px;
            height: 280px;
            object-fit: cover;
            border-radius: 8px;
        }

        .book-info {
            flex: 1;
        }

        .book-title {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #0a2540;
        }

        .book-author {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 15px;
        }

        .book-price {
            font-size: 1.5rem;
            color: #8B4513;
            font-weight: bold;
            margin: 15px 0;
        }

        .btn {
            padding: 10px 25px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            margin-right: 10px;
        }

        .btn-primary {
            background: #8B4513;
            color: white;
        }

        .btn-secondary {
            background: #0a2540;
            color: white;
        }

        .preview-section,
        .full-section {
            padding: 30px;
            line-height: 1.8;
        }

        /* ✅ Fix: Proper content formatting */
        .book-content {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Lora', serif;
            line-height: 1.8;
            font-size: 1.05rem;
        }

        .book-content h3 {
            margin-top: 20px;
            color: #8B4513;
        }

        .book-content hr {
            margin: 20px 0;
            border-color: #eee;
        }

        .warning {
            background: #fef5e7;
            padding: 15px;
            border-left: 4px solid #f39c12;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .book-header {
                flex-direction: column;
                text-align: center;
            }

            .book-cover {
                margin: 0 auto;
            }
        }
    </style>
</head>

<body>
    <nav>
        <div class="nav-brand"><a href="index.html">Readera</a></div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="browse.html">Browse Books</a>
        </div>
        <div class="nav-user">
            <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
            <a href="auth.html">Login</a>
        </div>
    </nav>

    <div class="container">
        <div id="book-container" class="book-container">
            <div style="text-align: center; padding: 50px;">Loading book...</div>
        </div>
    </div>

    <script>
        // ========== GLOBAL FUNCTIONS ==========

        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const el = document.getElementById('cart-count');
            if (el) el.textContent = cart.length;
        }

        window.addToCart = function (bookId, title, price, coverUrl) {
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const book = { id: bookId, title: title, price: price, cover_url: coverUrl };

            if (!cart.some(item => item.id === bookId)) {
                cart.push(book);
                localStorage.setItem('cart', JSON.stringify(cart));
                alert('✅ Added to cart!');
                updateCartCount();
            } else {
                alert('⚠️ Book already in cart!');
            }
        };

        window.buyNow = function (bookId, title, price, coverUrl) {
            window.addToCart(bookId, title, price, coverUrl);
            window.location.href = 'cart.html';
        };

        function checkPurchaseStatus(bookId) {
            const library = JSON.parse(localStorage.getItem('library') || '[]');
            return library.some(book => book.id === bookId);
        }

        // ✅ Format content with proper line breaks
        function formatContent(text) {
            if (!text) return '';
            // Convert markdown style headers
            let formatted = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            // Convert line breaks to <br> or paragraphs
            formatted = formatted.replace(/\n\n/g, '</p><p>');
            formatted = formatted.replace(/\n/g, '<br>');
            return `<p>${formatted}</p>`;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function (m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        async function loadBook() {
            const urlParams = new URLSearchParams(window.location.search);
            const bookId = urlParams.get('id');

            if (!bookId) {
                document.getElementById('book-container').innerHTML = '<div style="text-align:center;padding:50px;">No book ID provided</div>';
                return;
            }

            try {
                const response = await fetch('/books.json');
                const books = await response.json();
                const book = books.find(b => b.id == bookId);

                if (!book) {
                    document.getElementById('book-container').innerHTML = '<div style="text-align:center;padding:50px;">Book not found</div>';
                    return;
                }

                // Save to recent reads
                try {
                    let recent = JSON.parse(localStorage.getItem('recentBooks') || '[]');
                    recent = recent.filter(b => b.id !== book.id);
                    recent.unshift({ id: book.id, title: book.title, author: book.author, cover_url: book.cover_url });
                    if (recent.length > 10) recent.pop();
                    localStorage.setItem('recentBooks', JSON.stringify(recent));
                } catch (e) { }

                const purchased = checkPurchaseStatus(book.id);
                const isFree = book.price === 0;

                let contentHtml = '';

                if (purchased || isFree) {
                    // ✅ Full content with proper formatting
                    const fullText = book.full_content_text || book.description || 'Full content will appear here.';
                    contentHtml = `
                        <div class="full-section">
                            <div class="warning">📖 You have full access to this book!</div>
                            <div class="book-content">${formatContent(escapeHtml(fullText))}</div>
                        </div>
                    `;
                } else {
                    // Preview content
                    const previewText = book.preview_content || book.description || 'No preview available. Purchase to read full content.';
                    contentHtml = `
                        <div class="preview-section">
                            <div class="warning">🔒 This is a preview. Purchase the book to read the full content!</div>
                            <h3>📖 Free Preview</h3>
                            <div class="book-content">${formatContent(escapeHtml(previewText))}</div>
                            <div style="margin-top: 20px; padding: 15px; background: #f0f0f0; text-align: center; border-radius: 8px;">
                                ⭐ <strong>Only ₹${book.price}</strong> to unlock full book! ⭐
                            </div>
                        </div>
                    `;
                }

                const coverUrl = book.cover_url || 'https://via.placeholder.com/200x280?text=No+Cover';
                const escapedTitle = book.title.replace(/'/g, "\\'");

                const html = `
                    <div class="book-header">
                        <img src="${coverUrl}" class="book-cover" onerror="this.src='https://via.placeholder.com/200x280?text=No+Cover'">
                        <div class="book-info">
                            <h1 class="book-title">${escapeHtml(book.title)}</h1>
                            <p class="book-author">by ${escapeHtml(book.author) || 'Unknown'}</p>
                            <div class="book-price">${book.price === 0 ? 'FREE' : '₹' + book.price}</div>
                            <div class="book-actions">
                                ${!purchased && book.price > 0 ? `
                                    <button class="btn btn-primary" onclick="buyNow(${book.id}, '${escapedTitle}', ${book.price}, '${coverUrl}')">Buy Now (₹${book.price})</button>
                                    <button class="btn btn-secondary" onclick="addToCart(${book.id}, '${escapedTitle}', ${book.price}, '${coverUrl}')">Add to Cart</button>
                                ` : ''}
                                ${purchased ? `<button class="btn btn-primary" onclick="alert('You already own this book!')">✓ Already in Library</button>
                                    <a class="btn btn-secondary" href="reader.html?id=${book.id}" style="display:inline-block;text-align:center;">📖 Immersive reader</a>` : ''}
                                ${book.price === 0 ? `<button class="btn btn-primary" onclick="addToCart(${book.id}, '${escapedTitle}', 0, '${coverUrl}')">📖 Read Now (FREE)</button>
                                    <a class="btn btn-secondary" href="reader.html?id=${book.id}" style="display:inline-block;text-align:center;">Immersive reader</a>` : ''}
                            </div>
                        </div>
                    </div>
                    ${contentHtml}
                `;

                document.getElementById('book-container').innerHTML = html;

            } catch (error) {
                console.error(error);
                document.getElementById('book-container').innerHTML = '<div style="text-align:center;padding:50px;">Error loading book</div>';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateCartCount();
            loadBook();
        });
    </script>
    <script src="js/main.js"></script>
</body>

</html>
