<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in — Readera</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body.auth-body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(160deg, #f1f5f9 0%, #e2e8f0 50%, #fef3c7 100%);
            min-height: 100vh;
        }

        .auth-wrap {
            max-width: 440px;
            margin: 0 auto;
            padding: 2rem 1.25rem 4rem;
        }

        .auth-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 12px 40px rgba(15, 23, 42, 0.08);
            border: 1px solid rgba(15, 23, 42, 0.06);
            overflow: hidden;
        }

        .auth-card-head {
            background: linear-gradient(135deg, #0a2540 0%, #1e3a5f 100%);
            color: #fff;
            padding: 1.5rem 1.75rem;
        }

        .auth-card-head h1 {
            font-size: 1.35rem;
            font-weight: 700;
            margin: 0 0 0.35rem;
        }

        .auth-card-head p {
            margin: 0;
            font-size: 0.88rem;
            opacity: 0.88;
            line-height: 1.45;
        }

        .auth-tabs {
            display: flex;
            border-bottom: 1px solid #e2e8f0;
        }

        .auth-tab {
            flex: 1;
            padding: 0.9rem 1rem;
            border: none;
            background: #f8fafc;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.92rem;
            color: #64748b;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }

        .auth-tab.active {
            background: #fff;
            color: #0a2540;
            box-shadow: inset 0 -2px 0 #8B4513;
        }

        .auth-panel {
            display: none;
            padding: 1.75rem;
        }

        .auth-panel.active {
            display: block;
        }

        .form-group {
            margin-bottom: 1.1rem;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #334155;
            margin-bottom: 0.4rem;
        }

        .form-group .hint {
            font-size: 0.72rem;
            color: #64748b;
            margin-top: 0.25rem;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap i.fa {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .input-wrap input {
            width: 100%;
            padding: 0.7rem 0.85rem 0.7rem 2.35rem;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-wrap input:focus {
            outline: none;
            border-color: #8B4513;
            box-shadow: 0 0 0 3px rgba(139, 69, 19, 0.12);
        }

        .pw-toggle {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: none;
            color: #64748b;
            cursor: pointer;
            padding: 0.25rem;
        }

        .btn-submit {
            width: 100%;
            padding: 0.85rem 1rem;
            background: #8B4513;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1rem;
            font-family: inherit;
            cursor: pointer;
            margin-top: 0.25rem;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-submit:hover {
            background: #6b3410;
        }

        .btn-submit:active {
            transform: scale(0.99);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .msg {
            margin-top: 0.85rem;
            padding: 0.65rem 0.75rem;
            border-radius: 8px;
            font-size: 0.88rem;
            text-align: center;
            display: none;
        }

        .msg.err {
            display: block;
            background: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }

        .msg.ok {
            display: block;
            background: #ecfdf5;
            color: #047857;
            border: 1px solid #a7f3d0;
        }

        .auth-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0 0;
            margin-bottom: 1.5rem;
        }

        .auth-nav a {
            color: #0a2540;
            font-weight: 600;
            text-decoration: none;
        }

        .auth-nav a:hover {
            color: #8B4513;
        }

        .strength-bar {
            height: 4px;
            border-radius: 2px;
            background: #e2e8f0;
            margin-top: 0.35rem;
            overflow: hidden;
        }

        .strength-bar span {
            display: block;
            height: 100%;
            width: 0%;
            transition: width 0.2s, background 0.2s;
        }
    </style>
</head>

<body class="auth-body">
    <div class="auth-wrap">
        <div class="auth-nav">
            <a href="index.html"><i class="fas fa-arrow-left"></i> Home</a>
            <a href="browse.html">Browse books</a>
        </div>

        <div class="auth-card">
            <div class="auth-card-head">
                <h1>Readera</h1>
                <p>Sign in with your email. New users can create an account in seconds.</p>
            </div>
            <div class="auth-tabs">
                <button type="button" class="auth-tab active" data-tab="login">Log in</button>
                <button type="button" class="auth-tab" data-tab="signup">Sign up</button>
            </div>

            <div id="panel-login" class="auth-panel active">
                <form id="form-login" autocomplete="on">
                    <div class="form-group">
                        <label for="login-id">Email or mobile</label>
                        <div class="input-wrap">
                            <i class="fas fa-user" aria-hidden="true"></i>
                            <input type="text" id="login-id" name="loginId" required autocomplete="username"
                                placeholder="you@email.com or 9876543210" inputmode="email">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <div class="input-wrap">
                            <i class="fas fa-lock" aria-hidden="true"></i>
                            <input type="password" id="login-password" required autocomplete="current-password"
                                placeholder="••••••••">
                            <button type="button" class="pw-toggle" data-target="login-password"
                                aria-label="Show password"><i class="fas fa-eye"></i></button>
                        </div>
                    </div>
                    <button type="submit" class="btn-submit" id="btn-login">Log in securely</button>
                    <div id="login-msg" class="msg" role="alert"></div>
                </form>
            </div>

            <div id="panel-signup" class="auth-panel">
                <form id="form-signup" autocomplete="on">
                    <div class="form-group">
                        <label for="su-name">Full name</label>
                        <div class="input-wrap">
                            <i class="fas fa-id-card" aria-hidden="true"></i>
                            <input type="text" id="su-name" required autocomplete="name" placeholder="Your name">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="su-email">Email</label>
                        <div class="input-wrap">
                            <i class="fas fa-envelope" aria-hidden="true"></i>
                            <input type="email" id="su-email" required autocomplete="email" placeholder="you@email.com">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="su-password">Password</label>
                        <div class="input-wrap">
                            <i class="fas fa-lock" aria-hidden="true"></i>
                            <input type="password" id="su-password" required autocomplete="new-password"
                                placeholder="At least 6 characters">
                            <button type="button" class="pw-toggle" data-target="su-password"
                                aria-label="Show password"><i class="fas fa-eye"></i></button>
                        </div>
                        <div class="strength-bar" aria-hidden="true"><span id="pw-strength"></span></div>
                        <p class="hint">At least 8 characters, including letters and numbers.</p>
                    </div>
                    <div class="form-group">
                        <label for="su-password2">Confirm password</label>
                        <div class="input-wrap">
                            <i class="fas fa-lock" aria-hidden="true"></i>
                            <input type="password" id="su-password2" required autocomplete="new-password"
                                placeholder="Repeat password">
                        </div>
                    </div>
                    <button type="submit" class="btn-submit" id="btn-signup">Create account</button>
                    <div id="signup-msg" class="msg" role="alert"></div>
                </form>
            </div>
        </div>

        <p style="text-align:center;font-size:0.8rem;color:#64748b;margin-top:1.25rem;">
            By continuing you agree to our <a href="terms.html">Terms</a> and <a href="privacy.html">Privacy Policy</a>.
        </p>
    </div>

    <script>
        // Simple working login - no backend needed
        function showMsg(id, text, isOk) {
            const el = document.getElementById(id);
            el.className = 'msg ' + (isOk ? 'ok' : 'err');
            el.textContent = text;
            setTimeout(() => {
                el.className = 'msg';
                el.textContent = '';
            }, 3000);
        }

        function clearMsg(id) {
            const el = document.getElementById(id);
            el.className = 'msg';
            el.textContent = '';
        }

        // Tab switching
        document.querySelectorAll('.auth-tab').forEach((tab) => {
            tab.addEventListener('click', () => {
                const name = tab.getAttribute('data-tab');
                document.querySelectorAll('.auth-tab').forEach((t) => t.classList.toggle('active', t === tab));
                document.getElementById('panel-login').classList.toggle('active', name === 'login');
                document.getElementById('panel-signup').classList.toggle('active', name === 'signup');
                clearMsg('login-msg');
                clearMsg('signup-msg');
            });
        });

        // Password show/hide
        document.querySelectorAll('.pw-toggle').forEach((btn) => {
            btn.addEventListener('click', () => {
                const id = btn.getAttribute('data-target');
                const inp = document.getElementById(id);
                const show = inp.type === 'password';
                inp.type = show ? 'text' : 'password';
                btn.querySelector('i').className = show ? 'fas fa-eye-slash' : 'fas fa-eye';
            });
        });

        // Password strength
        const suPw = document.getElementById('su-password');
        const strengthEl = document.getElementById('pw-strength');
        if (suPw) {
            suPw.addEventListener('input', () => {
                const p = suPw.value;
                const pct = Math.min(100, (p.length / 12) * 100);
                strengthEl.style.width = pct + '%';
                strengthEl.style.background = pct < 40 ? '#ef4444' : pct < 70 ? '#f59e0b' : '#10b981';
            });
        }

        // ========== LOGIN - SIMPLE FIX ==========
        document.getElementById('form-login').addEventListener('submit', (e) => {
            e.preventDefault();
            clearMsg('login-msg');

            const loginId = document.getElementById('login-id').value.trim();
            const password = document.getElementById('login-password').value;

            // Simple demo login check
            if (loginId === 'demo@readera.com' && password === 'demo123') {
                showMsg('login-msg', 'Login successful! Redirecting...', true);
                setTimeout(() => {
                    window.location.href = 'profile.html';
                }, 1000);
            }
            else if (loginId === '' || password === '') {
                showMsg('login-msg', 'Please enter email and password', false);
            }
            else {
                showMsg('login-msg', 'Invalid email or password. Try: demo@readera.com / demo123', false);
            }
        });

        // ========== SIGNUP - SIMPLE FIX ==========
        document.getElementById('form-signup').addEventListener('submit', (e) => {
            e.preventDefault();
            clearMsg('signup-msg');

            const name = document.getElementById('su-name').value.trim();
            const email = document.getElementById('su-email').value.trim();
            const password = document.getElementById('su-password').value;
            const password2 = document.getElementById('su-password2').value;

            if (!name || !email || !password) {
                showMsg('signup-msg', 'Please fill all fields', false);
                return;
            }

            if (password !== password2) {
                showMsg('signup-msg', 'Passwords do not match', false);
                return;
            }

            if (password.length < 6) {
                showMsg('signup-msg', 'Password must be at least 6 characters', false);
                return;
            }

            // Save to localStorage
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const exists = users.find(u => u.email === email);

            if (exists) {
                showMsg('signup-msg', 'User already exists! Please login.', false);
                return;
            }

            users.push({ name, email, password });
            localStorage.setItem('users', JSON.stringify(users));

            showMsg('signup-msg', 'Account created! You can now login.', true);

            // Clear form
            document.getElementById('su-name').value = '';
            document.getElementById('su-email').value = '';
            document.getElementById('su-password').value = '';
            document.getElementById('su-password2').value = '';

            // Switch to login tab after 1 second
            setTimeout(() => {
                document.querySelector('[data-tab="login"]').click();
            }, 1000);
        });
    </script>
</body>

</html>
