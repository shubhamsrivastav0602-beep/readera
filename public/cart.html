<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Readera</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600&family=Playfair+Display:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        .cart-layout {
            display: flex;
            gap: 30px;
            margin-top: 20px;
        }

        .cart-items {
            flex-grow: 1;
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .cart-item {
            display: flex;
            gap: 20px;
            padding: 20px 0;
            border-bottom: 1px solid #eee;
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .ci-img {
            width: 80px;
            height: 120px;
            object-fit: cover;
            border-radius: 4px;
        }

        .ci-details {
            flex-grow: 1;
        }

        .ci-title {
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        .ci-author {
            color: #666;
        }

        .ci-price {
            font-size: 1.2rem;
            font-weight: bold;
            color: #8B4513;
        }

        .remove-btn {
            color: #e74c3c;
            background: none;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }

        .cart-summary {
            width: 350px;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            height: fit-content;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        .summary-total {
            border-top: 2px solid #eee;
            padding-top: 15px;
            margin-top: 15px;
            font-size: 1.3rem;
            font-weight: bold;
        }

        .checkout-btn {
            width: 100%;
            margin-top: 20px;
            padding: 15px;
            font-size: 1.1rem;
            background: #8B4513;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .checkout-btn:hover {
            background: #5a2d0c;
        }

        @media (max-width: 768px) {
            .cart-layout {
                flex-direction: column;
            }

            .cart-summary {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <nav>
        <div class="nav-brand"><a href="index.html">Readera</a></div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="browse.html">Browse Books</a>
        </div>
        <div class="nav-user">
            <a href="cart.html" class="cart-link">Cart (<span id="cart-count">0</span>)</a>
            <a href="auth.html" class="btn btn-primary">Login</a>
        </div>
    </nav>

    <div class="container">
        <h1 class="section-title">Shopping Cart</h1>

        <div id="empty-cart-msg" style="display:none; text-align:center; padding: 40px;">
            <h2>Your cart is empty.</h2>
            <a href="browse.html" class="btn btn-primary">Browse Books</a>
        </div>

        <div class="cart-layout" id="cart-layout">
            <div class="cart-items" id="cart-items-container"></div>
            <div class="cart-summary">
                <h3>Order Summary</h3>
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="subtotal">₹0</span>
                </div>
                <div class="summary-row summary-total">
                    <span>Total</span>
                    <span id="total-price">₹0</span>
                </div>
                <button class="checkout-btn" id="checkout-btn">Proceed to Payment</button>
            </div>
        </div>
    </div>

    <script>
        // ✅ Razorpay Test Key (Apni key daalo)
        const RAZORPAY_KEY_ID = 'rzp_test_SZWU44PkOGGlI2';

        // Cart functions
        function getCart() {
            return JSON.parse(localStorage.getItem('cart') || '[]');
        }

        function saveCart(cart) {
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
        }

        function clearCart() {
            localStorage.removeItem('cart');
            updateCartCount();
        }

        function updateCartCount() {
            const cart = getCart();
            const countEl = document.getElementById('cart-count');
            if (countEl) countEl.textContent = cart.length;
        }

        function removeFromCart(bookId) {
            let cart = getCart().filter(item => item.id !== bookId);
            saveCart(cart);
            renderCart();
            showToast('Removed from cart');
        }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.textContent = message;
            toast.style.cssText = `
                position: fixed;
                bottom: 20px;
                right: 20px;
                background: ${type === 'error' ? '#e74c3c' : '#27ae60'};
                color: white;
                padding: 12px 20px;
                border-radius: 8px;
                z-index: 1000;
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function renderCart() {
            const cart = getCart();
            const layout = document.getElementById('cart-layout');
            const emptyMsg = document.getElementById('empty-cart-msg');
            const container = document.getElementById('cart-items-container');

            if (cart.length === 0) {
                layout.style.display = 'none';
                emptyMsg.style.display = 'block';
                return;
            }

            layout.style.display = 'flex';
            emptyMsg.style.display = 'none';

            let total = 0;
            container.innerHTML = cart.map(item => {
                total += (item.price || 0);
                return `
                <div class="cart-item">
                    <img src="${item.cover_url || 'https://via.placeholder.com/80x120?text=Book'}" class="ci-img" onerror="this.src='https://via.placeholder.com/80x120?text=Book'">
                    <div class="ci-details">
                        <div class="ci-title">${escapeHtml(item.title)}</div>
                        <div class="ci-author">${escapeHtml(item.author) || 'Unknown'}</div>
                        <button class="remove-btn" onclick="removeFromCart(${item.id})">Remove</button>
                    </div>
                    <div class="ci-price">₹${item.price}</div>
                </div>
                `;
            }).join('');

            document.getElementById('subtotal').innerHTML = `₹${total}`;
            document.getElementById('total-price').innerHTML = `₹${total}`;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function (m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // ✅ Razorpay Checkout Function
        async function handleCheckout() {
            const cart = getCart();
            if (cart.length === 0) {
                showToast('Cart is empty', 'error');
                return;
            }

            // Check if user is logged in
            const token = localStorage.getItem('token');
            if (!token) {
                showToast('Please login first', 'error');
                window.location.href = 'auth.html?redirect=cart.html';
                return;
            }

            const amount = cart.reduce((sum, item) => sum + (item.price || 0), 0);
            const bookIds = cart.map(item => item.id);

            showToast('Creating order...', 'success');

            try {
                // Create order
                const orderRes = await fetch('/api/create-order', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount, bookIds })
                });

                const order = await orderRes.json();

                if (!order.id) throw new Error('Order creation failed');

                const options = {
                    key: RAZORPAY_KEY_ID,
                    amount: order.amount,
                    currency: order.currency,
                    name: 'Readera',
                    description: `Purchase of ${cart.length} book(s)`,
                    order_id: order.id,
                    handler: async function (response) {
                        // Verify payment
                        const verifyRes = await fetch('/api/verify-payment', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                razorpay_order_id: response.razorpay_order_id,
                                razorpay_payment_id: response.razorpay_payment_id,
                                razorpay_signature: response.razorpay_signature,
                                bookIds: bookIds
                            })
                        });

                        const result = await verifyRes.json();

                        if (result.success) {
                            // Add to library
                            let library = JSON.parse(localStorage.getItem('library') || '[]');
                            cart.forEach(book => {
                                if (!library.find(b => b.id === book.id)) {
                                    library.push(book);
                                }
                            });
                            localStorage.setItem('library', JSON.stringify(library));

                            clearCart();
                            showToast('✅ Payment successful! Books added to your library.');
                            setTimeout(() => window.location.href = 'library.html', 2000);
                        } else {
                            showToast('Payment verification failed', 'error');
                        }
                    },
                    prefill: {
                        name: localStorage.getItem('userName') || 'Reader',
                        email: localStorage.getItem('userEmail') || 'reader@example.com'
                    },
                    theme: { color: '#8B4513' }
                };

                const razorpay = new Razorpay(options);
                razorpay.open();

            } catch (error) {
                console.error('Payment error:', error);
                showToast('Payment failed. Please try again.', 'error');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateCartCount();
            renderCart();
            document.getElementById('checkout-btn').addEventListener('click', handleCheckout);
        });
    </script>
</body>

</html>
