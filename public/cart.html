<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Readera</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav>
        <div class="nav-brand"><a href="index.html">Readera</a></div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="browse.html">Browse Books</a>
        </div>
        <div class="nav-user">
            <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
            <a href="auth.html">Login</a>
        </div>
    </nav>

    <div class="container">
        <h1>Shopping Cart</h1>

        <div id="cart-items"></div>
        <div id="cart-total"></div>

        <button id="checkout-btn"
            style="background: #8B4513; color: white; padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer;">Proceed
            to Payment</button>
    </div>

    <script>
        // Simple cart functions
        function getCart() {
            const cart = localStorage.getItem('cart');
            return cart ? JSON.parse(cart) : [];
        }

        function saveCart(cart) {
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
        }

        function updateCartCount() {
            const cart = getCart();
            const countEl = document.getElementById('cart-count');
            if (countEl) countEl.textContent = cart.length;
        }

        function removeItem(bookId) {
            let cart = getCart();
            cart = cart.filter(item => item.id !== bookId);
            saveCart(cart);
            displayCart();
        }

        function displayCart() {
            const cart = getCart();
            const container = document.getElementById('cart-items');
            const totalEl = document.getElementById('cart-total');

            if (cart.length === 0) {
                container.innerHTML = '<p>Your cart is empty.</p>';
                totalEl.innerHTML = '';
                return;
            }

            let html = '<ul style="list-style: none; padding: 0;">';
            let total = 0;

            for (let i = 0; i < cart.length; i++) {
                const book = cart[i];
                total = total + (book.price || 0);
                html += `
                    <li style="border-bottom: 1px solid #ddd; padding: 15px 0; display: flex; justify-content: space-between;">
                        <div>
                            <strong>${book.title}</strong><br>
                            ₹${book.price}
                        </div>
                        <button onclick="removeItem(${book.id})" style="background: #e74c3c; color: white; border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer;">Remove</button>
                    </li>
                `;
            }

            html += '</ul>';
            container.innerHTML = html;
            totalEl.innerHTML = `<h3>Total: ₹${total}</h3>`;
        }

        // Checkout button click handler
        document.getElementById('checkout-btn').addEventListener('click', function () {
            const cart = getCart();
            if (cart.length === 0) {
                alert('Cart is empty!');
                return;
            }

            const token = localStorage.getItem('token');
            if (!token) {
                alert('Please login first!');
                window.location.href = 'auth.html';
                return;
            }

            alert('Checkout clicked! Cart has ' + cart.length + ' books. Total: ₹' + cart.reduce((s, b) => s + (b.price || 0), 0));
        });

        // Load cart on page load
        displayCart();
        updateCartCount();
    </script>
</body>

</html>
